method: bayes
metric:
  name: final_val_accuracy
  goal: maximize
parameters:
  learning_rate:
    min: 0.00001
    max: 0.01
  batch_size:
    values: [16, 32, 64]
  num_neurons:
    values: [32, 64, 128]  # Respecting constraint: max 128 neurons per layer
  hidden_layers:
    values: [2, 3, 4]  # Respecting constraint: max 6 layers
  activation:
    values: ["relu", "tanh", "sigmoid"]
  weight_init:
    values: ["xavier", "random"]
  epochs:
    values: [10, 20]
early_terminate:
  type: hyperband
  min_iter: 5
  max_iter: 30